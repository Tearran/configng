
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_jellyseerr install
        [ -z "$(./bin/armbian-config --api \"module_jellyseerr\" remove  | grep remove)" ]
	./bin/armbian-config --api module_jellyseerr remove
	[ -z "$(./bin/armbian-config --api \"module_jellyseerr\" purge | grep purge)" ]
}

