
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_medusa install
        [ -z "$(./bin/armbian-config --api \"module_medusa\" remove  | grep remove)" ]
	./bin/armbian-config --api module_medusa remove
	[ -z "$(./bin/armbian-config --api \"module_medusa\" purge | grep purge)" ]
}

