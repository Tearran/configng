
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_phpmyadmin install
        [ -z "$(./bin/armbian-config --api \"module_phpmyadmin\" remove  | grep remove)" ]
	./bin/armbian-config --api module_phpmyadmin remove
	[ -z "$(./bin/armbian-config --api \"module_phpmyadmin\" purge | grep purge)" ]
}

