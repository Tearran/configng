
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_netdata install
        [ -z "$(./bin/armbian-config --api \"module_netdata\" remove  | grep remove)" ]
	./bin/armbian-config --api module_netdata remove
	[ -z "$(./bin/armbian-config --api \"module_netdata\" purge | grep purge)" ]
}

