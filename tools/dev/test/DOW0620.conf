
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_transmission install
        [ -z "$(./bin/armbian-config --api \"module_transmission\" remove  | grep remove)" ]
	./bin/armbian-config --api module_transmission remove
	[ -z "$(./bin/armbian-config --api \"module_transmission\" purge | grep purge)" ]
}

