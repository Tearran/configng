
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_embyserver install
        [ -z "$(./bin/armbian-config --api \"module_embyserver\" remove  | grep remove)" ]
	./bin/armbian-config --api module_embyserver remove
	[ -z "$(./bin/armbian-config --api \"module_embyserver\" purge | grep purge)" ]
}

