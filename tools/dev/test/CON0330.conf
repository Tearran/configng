
ENABLED=true
RELEASE="x86-64 arm64 armhf"

function testcase(){
	./bin/armbian-config --api module_portainer install
        [ -z "$(./bin/armbian-config --api \"module_portainer\" remove  | grep remove)" ]
	./bin/armbian-config --api module_portainer remove
	[ -z "$(./bin/armbian-config --api \"module_portainer\" purge | grep purge)" ]
}

