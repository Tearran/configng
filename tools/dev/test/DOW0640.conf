
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_navidrome install
        [ -z "$(./bin/armbian-config --api \"module_navidrome\" remove  | grep remove)" ]
	./bin/armbian-config --api module_navidrome remove
	[ -z "$(./bin/armbian-config --api \"module_navidrome\" purge | grep purge)" ]
}

