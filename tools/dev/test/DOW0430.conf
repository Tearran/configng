
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_lidarr install
        [ -z "$(./bin/armbian-config --api \"module_lidarr\" remove  | grep remove)" ]
	./bin/armbian-config --api module_lidarr remove
	[ -z "$(./bin/armbian-config --api \"module_lidarr\" purge | grep purge)" ]
}

