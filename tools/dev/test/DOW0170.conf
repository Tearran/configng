
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_sonarr install
        [ -z "$(./bin/armbian-config --api \"module_sonarr\" remove  | grep remove)" ]
	./bin/armbian-config --api module_sonarr remove
	[ -z "$(./bin/armbian-config --api \"module_sonarr\" purge | grep purge)" ]
}

