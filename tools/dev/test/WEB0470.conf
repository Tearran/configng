
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_swag install
        [ -z "$(./bin/armbian-config --api \"module_swag\" remove  | grep remove)" ]
	./bin/armbian-config --api module_swag remove
	[ -z "$(./bin/armbian-config --api \"module_swag\" purge | grep purge)" ]
}

