
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_bazarr install
        [ -z "$(./bin/armbian-config --api \"module_bazarr\" remove  | grep remove)" ]
	./bin/armbian-config --api module_bazarr remove
	[ -z "$(./bin/armbian-config --api \"module_bazarr\" purge | grep purge)" ]
}

