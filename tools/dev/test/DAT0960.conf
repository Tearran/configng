
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_prowlarr install
        [ -z "$(./bin/armbian-config --api \"module_prowlarr\" remove  | grep remove)" ]
	./bin/armbian-config --api module_prowlarr remove
	[ -z "$(./bin/armbian-config --api \"module_prowlarr\" purge | grep purge)" ]
}

