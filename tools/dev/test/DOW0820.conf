
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_uptimekuma install
        [ -z "$(./bin/armbian-config --api \"module_uptimekuma\" remove  | grep remove)" ]
	./bin/armbian-config --api module_uptimekuma remove
	[ -z "$(./bin/armbian-config --api \"module_uptimekuma\" purge | grep purge)" ]
}

