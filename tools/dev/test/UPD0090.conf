
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_watchtower install
        [ -z "$(./bin/armbian-config --api \"module_watchtower\" remove  | grep remove)" ]
	./bin/armbian-config --api module_watchtower remove
	[ -z "$(./bin/armbian-config --api \"module_watchtower\" status | grep status)" ]
}

