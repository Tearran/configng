
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_pi_hole install
        [ -z "$(./bin/armbian-config --api \"module_pi_hole\" remove  | grep remove)" ]
	./bin/armbian-config --api module_pi_hole remove
	[ -z "$(./bin/armbian-config --api \"module_pi_hole\" purge | grep purge)" ]
}

