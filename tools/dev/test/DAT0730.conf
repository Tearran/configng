
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_owncloud install
        [ -z "$(./bin/armbian-config --api \"module_owncloud\" remove  | grep remove)" ]
	./bin/armbian-config --api module_owncloud remove
	[ -z "$(./bin/armbian-config --api \"module_owncloud\" purge | grep purge)" ]
}

