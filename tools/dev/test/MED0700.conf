
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_syncthing install
        [ -z "$(./bin/armbian-config --api \"module_syncthing\" remove  | grep remove)" ]
	./bin/armbian-config --api module_syncthing remove
	[ -z "$(./bin/armbian-config --api \"module_syncthing\" purge | grep purge)" ]
}

