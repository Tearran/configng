
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_nextcloud install
        [ -z "$(./bin/armbian-config --api \"module_nextcloud\" remove  | grep remove)" ]
	./bin/armbian-config --api module_nextcloud remove
	[ -z "$(./bin/armbian-config --api \"module_nextcloud\" purge | grep purge)" ]
}

