
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_deluge install
        [ -z "$(./bin/armbian-config --api \"module_deluge\" remove  | grep remove)" ]
	./bin/armbian-config --api module_deluge remove
	[ -z "$(./bin/armbian-config --api \"module_deluge\" purge | grep purge)" ]
}

