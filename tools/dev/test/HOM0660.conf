
ENABLED=true
RELEASE="x86-64 arm64 armhf"

function testcase(){
	./bin/armbian-config --api module_openhab install
        [ -z "$(./bin/armbian-config --api \"module_openhab\" remove  | grep remove)" ]
	./bin/armbian-config --api module_openhab remove
	[ -z "$(./bin/armbian-config --api \"module_openhab\" purge | grep purge)" ]
}

