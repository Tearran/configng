
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_sabnzbd install
        [ -z "$(./bin/armbian-config --api \"module_sabnzbd\" remove  | grep remove)" ]
	./bin/armbian-config --api module_sabnzbd remove
	[ -z "$(./bin/armbian-config --api \"module_sabnzbd\" purge | grep purge)" ]
}

