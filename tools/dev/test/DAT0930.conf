
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_mariadb install
        [ -z "$(./bin/armbian-config --api \"module_mariadb\" remove  | grep remove)" ]
	./bin/armbian-config --api module_mariadb remove
	[ -z "$(./bin/armbian-config --api \"module_mariadb\" purge | grep purge)" ]
}

