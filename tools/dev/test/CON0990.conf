
ENABLED=true
RELEASE="x86-64 arm64 armhf"

function testcase(){
	./bin/armbian-config --api module_docker install
        [ -z "$(./bin/armbian-config --api \"module_docker\" remove  | grep remove)" ]
	./bin/armbian-config --api module_docker remove
	[ -z "$(./bin/armbian-config --api \"module_docker\" purge | grep purge)" ]
}

