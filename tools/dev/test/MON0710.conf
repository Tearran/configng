
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_grafana install
        [ -z "$(./bin/armbian-config --api \"module_grafana\" remove  | grep remove)" ]
	./bin/armbian-config --api module_grafana remove
	[ -z "$(./bin/armbian-config --api \"module_grafana\" purge | grep purge)" ]
}

