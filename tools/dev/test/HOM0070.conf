
ENABLED=true
RELEASE="x86-64 arm64 armhf"

function testcase(){
	./bin/armbian-config --api module_haos install
        [ -z "$(./bin/armbian-config --api \"module_haos\" remove  | grep remove)" ]
	./bin/armbian-config --api module_haos remove
	[ -z "$(./bin/armbian-config --api \"module_haos\" purge | grep purge)" ]
}

