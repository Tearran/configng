
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_stirling install
        [ -z "$(./bin/armbian-config --api \"module_stirling\" remove  | grep remove)" ]
	./bin/armbian-config --api module_stirling remove
	[ -z "$(./bin/armbian-config --api \"module_stirling\" purge | grep purge)" ]
}

