
ENABLED=true
RELEASE="x86-64 arm64 armhf"

function testcase(){
	./bin/armbian-config --api module_webmin install
        [ -z "$(./bin/armbian-config --api \"module_webmin\" install  | grep install)" ]
	./bin/armbian-config --api module_webmin remove
	[ -z "$(./bin/armbian-config --api \"module_webmin\" remove | grep remove)" ]
}

