
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_octoprint install
        [ -z "$(./bin/armbian-config --api \"module_octoprint\" remove  | grep remove)" ]
	./bin/armbian-config --api module_octoprint remove
	[ -z "$(./bin/armbian-config --api \"module_octoprint\" purge | grep purge)" ]
}

