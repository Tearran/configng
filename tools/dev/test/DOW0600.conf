
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_qbittorrent install
        [ -z "$(./bin/armbian-config --api \"module_qbittorrent\" remove  | grep remove)" ]
	./bin/armbian-config --api module_qbittorrent remove
	[ -z "$(./bin/armbian-config --api \"module_qbittorrent\" purge | grep purge)" ]
}

