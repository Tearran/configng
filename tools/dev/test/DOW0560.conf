
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_radarr install
        [ -z "$(./bin/armbian-config --api \"module_radarr\" remove  | grep remove)" ]
	./bin/armbian-config --api module_radarr remove
	[ -z "$(./bin/armbian-config --api \"module_radarr\" purge | grep purge)" ]
}

