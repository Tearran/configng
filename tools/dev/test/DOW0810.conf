
ENABLED=true
RELEASE="x86-64 arm64"

function testcase(){
	./bin/armbian-config --api module_readarr install
        [ -z "$(./bin/armbian-config --api \"module_readarr\" remove  | grep remove)" ]
	./bin/armbian-config --api module_readarr remove
	[ -z "$(./bin/armbian-config --api \"module_readarr\" purge | grep purge)" ]
}

