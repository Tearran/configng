
ENABLED=true
RELEASE="x86-64 arm64 armhf"

function testcase(){
	./bin/armbian-config --api module_cockpit install
        [ -z "$(./bin/armbian-config --api \"module_cockpit\" install  | grep install)" ]
	./bin/armbian-config --api module_cockpit remove
	[ -z "$(./bin/armbian-config --api \"module_cockpit\" remove | grep remove)" ]
}

